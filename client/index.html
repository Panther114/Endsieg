<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Endsieg — Multiplayer Board Game</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="stars"></div>
  <div id="lobby" class="container">
    <header>
      <h1 class="game-title">ENDSIEG</h1>
      <p class="game-subtitle">By Gavania</p>
    </header>

    <div class="card">
      <div class="form-group">
        <label for="playerName">Your Name</label>
        <input id="playerName" type="text" placeholder="Enter your name..." maxlength="16" autocomplete="off" spellcheck="false" />
      </div>

      <div class="form-group">
        <label>Choose Your Color</label>
        <div id="colorPicker" class="color-picker">
          <button type="button" class="color-swatch selected" data-color="#7C4DFF" style="background:#7C4DFF;" title="Electric Violet" aria-label="Electric Violet"></button>
          <button type="button" class="color-swatch" data-color="#00BFA5" style="background:#00BFA5;" title="Teal" aria-label="Teal"></button>
          <button type="button" class="color-swatch" data-color="#FF6D00" style="background:#FF6D00;" title="Deep Orange" aria-label="Deep Orange"></button>
          <button type="button" class="color-swatch" data-color="#1565C0" style="background:#1565C0;" title="Navy Blue" aria-label="Navy Blue"></button>
          <button type="button" class="color-swatch" data-color="#2E7D32" style="background:#2E7D32;" title="Forest Green" aria-label="Forest Green"></button>
          <button type="button" class="color-swatch" data-color="#AD1457" style="background:#AD1457;" title="Berry" aria-label="Berry"></button>
          <button type="button" class="color-swatch" data-color="#37474F" style="background:#37474F;" title="Slate Grey" aria-label="Slate Grey"></button>
          <button type="button" class="color-swatch" data-color="#4A148C" style="background:#4A148C;" title="Dark Violet" aria-label="Dark Violet"></button>
          <button type="button" class="color-swatch" data-color="#F5F5F5" style="background:#F5F5F5;" title="White" aria-label="White"></button>
          <button type="button" class="color-swatch" data-color="#212121" style="background:#212121;border-color:rgba(255,255,255,0.3);" title="Black" aria-label="Black"></button>
        </div>
      </div>

      <button class="btn btn-primary btn-large" onclick="createRoom()">
        ⚔️ Create New Room
      </button>

      <div class="divider"><span>OR</span></div>

      <div class="form-group">
        <label for="roomCode">Room Code</label>
        <input id="roomCode" type="text" placeholder="Enter 4-digit code..." maxlength="4"
               style="text-transform:uppercase;letter-spacing:6px;text-align:center;" autocomplete="off" spellcheck="false" />
      </div>

      <button class="btn btn-secondary btn-large" onclick="joinRoom()">
        🚀 Join Room
      </button>
    </div>

    <div id="roomInfo" class="card room-info" style="display:none;">
      <h2>Room Code</h2>
      <div id="roomCode-display" class="room-code" onclick="copyRoomCode()" title="Click to copy"></div>
      <p class="copy-hint">Click to copy</p>

      <h3>Players</h3>
      <ul id="playerList" class="player-list"></ul>

      <div id="hostControls" style="display:none;">
        <div class="form-group" style="margin-bottom:8px;">
          <label for="startingFunds">Starting Funds</label>
          <input id="startingFunds" type="number" min="500" max="10000" value="1500" step="100" />
        </div>
        <div id="gameRulesPanel" class="game-rules-panel">
          <h3>Game Rules</h3>
          <label><input type="checkbox" id="rule-doubleRentFullSet" checked> Double Rent on Full Set</label>
          <label><input type="checkbox" id="rule-vacationCash" checked> Vacation Cash (Free Parking Pool)</label>
          <label><input type="checkbox" id="rule-auction" checked> Auction on Skip</label>
          <label><input type="checkbox" id="rule-noRentInJail" checked> No Rent While in Jail</label>
          <label><input type="checkbox" id="rule-mortgage" checked> Mortgage Properties</label>
          <label><input type="checkbox" id="rule-evenBuild" checked> Even Build Rule</label>
        </div>
        <button class="btn btn-primary btn-large" onclick="startGame()">
          ▶ Start Game
        </button>
        <p class="hint">You are the host. Start when everyone is ready.</p>
      </div>
      <div id="guestWait" style="display:none;">
        <p class="hint waiting">⏳ Waiting for host to start the game...</p>
      </div>
    </div>

    <div id="errorMsg" class="error-msg" style="display:none;"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
