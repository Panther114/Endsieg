<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Endsieg — Multiplayer Board Game</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans+Narrow:wght@700&family=PT+Sans:wght@400;700&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="stars"></div>
  <div id="lobby" class="container">
    <header>
      <h1 class="game-title">ENDSIEG</h1>
      <p class="game-subtitle">By Gavania</p>
    </header>

    <div class="card">
      <div class="form-group">
        <label for="playerName">Your Name</label>
        <input id="playerName" type="text" placeholder="Enter your name..." maxlength="16" autocomplete="off" />
      </div>

      <div class="form-group">
        <label>Choose Your Color</label>
        <div id="colorPicker" class="color-picker">
          <button type="button" class="color-swatch selected" data-color="#7B1FA2" style="background:#7B1FA2;" title="Deep Purple" aria-label="Deep Purple"></button>
          <button type="button" class="color-swatch" data-color="#006064" style="background:#006064;" title="Dark Teal" aria-label="Dark Teal"></button>
          <button type="button" class="color-swatch" data-color="#0288D1" style="background:#0288D1;" title="Light Blue" aria-label="Light Blue"></button>
          <button type="button" class="color-swatch" data-color="#FF6F00" style="background:#FF6F00;" title="Dark Amber" aria-label="Dark Amber"></button>
          <button type="button" class="color-swatch" data-color="#2E7D32" style="background:#2E7D32;" title="Dark Green" aria-label="Dark Green"></button>
          <button type="button" class="color-swatch" data-color="#880E4F" style="background:#880E4F;" title="Dark Pink" aria-label="Dark Pink"></button>
          <button type="button" class="color-swatch" data-color="#37474F" style="background:#37474F;" title="Blue Grey" aria-label="Blue Grey"></button>
          <button type="button" class="color-swatch" data-color="#4527A0" style="background:#4527A0;" title="Deep Indigo" aria-label="Deep Indigo"></button>
        </div>
      </div>

      <button class="btn btn-primary btn-large" onclick="createRoom()">
        ⚔️ Create New Room
      </button>

      <div class="divider"><span>OR</span></div>

      <div class="form-group">
        <label for="roomCode">Room Code</label>
        <input id="roomCode" type="text" placeholder="Enter 4-digit code..." maxlength="4"
               style="text-transform:uppercase;letter-spacing:6px;text-align:center;" autocomplete="off" />
      </div>

      <button class="btn btn-secondary btn-large" onclick="joinRoom()">
        🚀 Join Room
      </button>
    </div>

    <div id="roomInfo" class="card room-info" style="display:none;">
      <h2>Room Code</h2>
      <div id="roomCode-display" class="room-code" onclick="copyRoomCode()" title="Click to copy"></div>
      <p class="copy-hint">Click to copy</p>

      <h3>Players</h3>
      <ul id="playerList" class="player-list"></ul>

      <div id="hostControls" style="display:none;">
        <div class="form-group" style="margin-bottom:8px;">
          <label for="startingFunds">Starting Funds</label>
          <input id="startingFunds" type="number" min="500" max="10000" value="1500" step="100" />
        </div>
        <button class="btn btn-primary btn-large" onclick="startGame()">
          ▶ Start Game
        </button>
        <p class="hint">You are the host. Start when everyone is ready.</p>
      </div>
      <div id="guestWait" style="display:none;">
        <p class="hint waiting">⏳ Waiting for host to start the game...</p>
      </div>
    </div>

    <div id="errorMsg" class="error-msg" style="display:none;"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
