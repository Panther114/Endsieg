<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Endsieg — Multiplayer Board Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="stars"></div>
  <div id="lobby" class="container">
    <header>
      <h1 class="game-title">ENDSIEG</h1>
      <p class="game-subtitle">Multiplayer Strategy Board Game</p>
    </header>

    <div class="card">
      <div class="form-group">
        <label for="playerName">Your Name</label>
        <input id="playerName" type="text" placeholder="Enter your name..." maxlength="16" autocomplete="off" />
      </div>

      <div class="form-group">
        <label>Choose Your Color</label>
        <div id="colorPicker" class="color-picker">
          <button type="button" class="color-swatch selected" data-color="#e74c3c" style="background:#e74c3c;" title="Red" aria-label="Red"></button>
          <button type="button" class="color-swatch" data-color="#3498db" style="background:#3498db;" title="Blue" aria-label="Blue"></button>
          <button type="button" class="color-swatch" data-color="#2ecc71" style="background:#2ecc71;" title="Green" aria-label="Green"></button>
          <button type="button" class="color-swatch" data-color="#f39c12" style="background:#f39c12;" title="Orange" aria-label="Orange"></button>
          <button type="button" class="color-swatch" data-color="#9b59b6" style="background:#9b59b6;" title="Purple" aria-label="Purple"></button>
          <button type="button" class="color-swatch" data-color="#1abc9c" style="background:#1abc9c;" title="Teal" aria-label="Teal"></button>
          <button type="button" class="color-swatch" data-color="#e91e63" style="background:#e91e63;" title="Pink" aria-label="Pink"></button>
          <button type="button" class="color-swatch" data-color="#ffd700" style="background:#ffd700;" title="Gold" aria-label="Gold"></button>
        </div>
      </div>

      <button class="btn btn-primary btn-large" onclick="createRoom()">
        ⚔️ Create New Room
      </button>

      <div class="divider"><span>OR</span></div>

      <div class="form-group">
        <label for="roomCode">Room Code</label>
        <input id="roomCode" type="text" placeholder="Enter 6-digit code..." maxlength="6"
               style="text-transform:uppercase;letter-spacing:4px;text-align:center;" autocomplete="off" />
      </div>

      <button class="btn btn-secondary btn-large" onclick="joinRoom()">
        🚀 Join Room
      </button>
    </div>

    <div id="roomInfo" class="card room-info" style="display:none;">
      <h2>Room Code</h2>
      <div id="roomCode-display" class="room-code" onclick="copyRoomCode()" title="Click to copy"></div>
      <p class="copy-hint">Click to copy</p>

      <h3>Players</h3>
      <ul id="playerList" class="player-list"></ul>

      <div id="hostControls" style="display:none;">
        <button class="btn btn-primary btn-large" onclick="startGame()">
          ▶ Start Game
        </button>
        <p class="hint">You are the host. Start when everyone is ready.</p>
      </div>
      <div id="guestWait" style="display:none;">
        <p class="hint waiting">⏳ Waiting for host to start the game...</p>
      </div>
    </div>

    <div id="errorMsg" class="error-msg" style="display:none;"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
